{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block body_class %}page--auth{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1 class="auth-card__title">Welcome back</h1>
    <p class="auth-card__subtitle">Sign in to your VideoCall account</p>

    <form class="auth-form" method="POST" action="{{ url_for('auth.login') }}" novalidate>
      {# CSRF token hidden field #}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-input"
          type="text"
          id="username"
          name="username"
          placeholder="your_username"
          autocomplete="username"
          required
          minlength="3"
          maxlength="80"
          pattern="[a-zA-Z0-9_]+"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-group">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="input-group__toggle" id="togglePassword" aria-label="Show password">
            &#128065;
          </button>
        </div>
      </div>

      <button class="btn btn--primary btn--full" type="submit">Sign in</button>
    </form>

    <p class="auth-card__footer">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Toggle password visibility
  document.getElementById('togglePassword').addEventListener('click', function () {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
    this.setAttribute('aria-label', input.type === 'password' ? 'Show password' : 'Hide password');
  });
</script>
{% endblock %}
